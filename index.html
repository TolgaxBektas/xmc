<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xMasterCenter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#2477b7;--blue-light:#eaf3fb;--blue-dark:#1d437e;--red:#dc2626;--red-bg:#FFF2F1;--orange:#E8790C;--orange-bg:#FFF8F0;--green:#16a34a;--green-bg:#F0FDF4;--yellow:#ca8a04;--yellow-bg:#FFFDE8;--gray:#86868B;--gray-light:#F5F5F7;--gray-border:#E8E8ED;--white:#FFFFFF;--shadow:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.08);--accent:#1d437e;--x-color:#1d437e;--x-upper:#E8790C;--x-lower:#00A8A8;--turquoise:#00A8A8}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:#F5F5F7;color:#1D1D1F;display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* === X-BRAND LOGO SYSTEM === */
.xlogo{display:inline-flex;align-items:baseline;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;line-height:1}
.xlogo .x{font-weight:900;color:var(--x-color);font-style:italic;margin-right:.25em}
.xlogo .upper{font-weight:700;color:var(--x-upper);letter-spacing:.3px}
.xlogo .lower{font-weight:500;color:var(--x-lower);letter-spacing:0}
.xlogo-lg{font-size:22px}.xlogo-lg .x{font-size:28px}
.xlogo-md{font-size:14px}.xlogo-md .x{font-size:18px}
.xlogo-sm{font-size:12px}.xlogo-sm .x{font-size:15px}

.sidebar{width:260px;background:var(--white);border-right:1px solid var(--gray-border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{height:64px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--gray-border)}
.mandant-switcher{padding:12px;border-bottom:1px solid var(--gray-border)}
.mandant-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--blue-light);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#1e3a5f}
.mandant-btn:hover{background:#c8dffc}
.mandant-dot{width:10px;height:10px;border-radius:50%;margin-right:8px;flex-shrink:0}
.mandant-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--gray-border);border-radius:8px;box-shadow:var(--shadow);z-index:100;max-height:250px;overflow-y:auto;margin-top:4px}
.mandant-dropdown button{width:100%;display:flex;align-items:center;padding:8px 12px;border:none;background:none;cursor:pointer;font-size:13px;text-align:left}
.mandant-dropdown button:hover{background:var(--gray-light)}
.mandant-dropdown button.active{background:var(--blue-light)}
.nav-items{flex:1;padding:12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--gray);text-decoration:none;margin-bottom:2px;transition:all .15s;gap:10px}
.nav-item:hover{background:var(--gray-light);color:#111}
.nav-item.active{background:rgba(29,67,126,.08);color:var(--blue-dark);font-weight:600}
.nav-item svg{width:20px;height:20px;flex-shrink:0}
.nav-item .xlogo .x{color:inherit}.nav-item.active .xlogo .x{color:var(--x-color)}
.nav-item .xlogo .upper{color:inherit}.nav-item.active .xlogo .upper{color:var(--x-upper)}
.nav-item .xlogo .lower{color:inherit}.nav-item.active .xlogo .lower{color:var(--x-lower)}

/* Sub-menu */
.nav-parent{position:relative}
.nav-parent .sub-arrow{margin-left:auto;transition:transform .2s;width:16px;height:16px;flex-shrink:0}
.nav-parent.open .sub-arrow{transform:rotate(180deg)}
.nav-sub{max-height:0;overflow:hidden;transition:max-height .25s ease;padding-left:16px}
.nav-parent.open .nav-sub{max-height:200px}
.nav-sub .nav-item{font-size:13px;padding:8px 12px;margin-bottom:1px}
.nav-sub .nav-item svg{width:16px;height:16px}

.user-panel{padding:12px;border-top:1px solid var(--gray-border)}
.user-info{display:flex;align-items:center;padding:8px 12px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue-dark);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin-right:10px}
.user-name{font-size:13px;font-weight:600;color:#111}
.user-email{font-size:11px;color:var(--gray)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-header{padding:20px 28px 0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:700;color:#111;display:flex;align-items:center;gap:10px}
.kpi-strip{display:flex;gap:12px;padding:16px 28px;overflow-x:auto}
.kpi-card{background:var(--white);border:1px solid var(--gray-border);border-radius:14px;padding:16px 20px;min-width:130px;flex:1;transition:box-shadow .2s}.kpi-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.kpi-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700}
.kpi-value.red{color:var(--red)}.kpi-value.orange{color:var(--orange)}.kpi-value.blue{color:var(--blue)}.kpi-value.green{color:var(--green)}
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 28px;flex-wrap:wrap}
.view-switcher{display:flex;background:var(--gray-light);border-radius:8px;overflow:hidden}
.view-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--gray);display:flex;align-items:center;gap:6px;transition:all .15s}
.view-btn.active{background:var(--white);color:var(--blue-dark);box-shadow:var(--shadow)}
.view-btn:hover:not(.active){background:#e8e8e8}
.search-box{flex:1;min-width:180px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--gray-border);border-radius:8px;font-size:13px;outline:none}
.search-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,67,126,.15)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray);width:16px;height:16px}
select.filter-select{padding:8px 12px;border:1px solid var(--gray-border);border-radius:8px;font-size:13px;background:var(--white);cursor:pointer}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:var(--blue-dark);color:var(--white);border-radius:10px}.btn-primary:hover{background:#152f5e}
.btn-secondary{background:var(--gray-light);color:#374151}.btn-secondary:hover{background:#ddd}
.btn-danger{background:var(--red);color:var(--white)}.btn-danger:hover{background:#b91c1c}
.btn-green{background:var(--green);color:var(--white)}.btn-green:hover{background:#15803d}
.btn-orange{background:var(--orange);color:var(--white)}.btn-orange:hover{background:#c56608}
.btn-turquoise{background:var(--turquoise);color:var(--white)}.btn-turquoise:hover{background:#008888}
.btn-sm{padding:5px 10px;font-size:12px}
.content-area{flex:1;overflow-y:auto;padding:0 28px 28px}
.status-group{margin-bottom:24px}
.status-header{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:13px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-border);margin-bottom:8px}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-count{background:var(--gray-light);border-radius:10px;padding:2px 8px;font-size:11px}
.task-row{display:flex;align-items:center;padding:12px 16px;background:var(--white);border:1px solid var(--gray-border);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.task-row:hover{border-color:var(--blue);box-shadow:0 2px 8px rgba(29,67,126,.1)}
.task-check{width:20px;height:20px;border:2px solid var(--gray-border);border-radius:6px;margin-right:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.task-check:hover{border-color:var(--green);background:var(--green-bg)}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-check.done svg{display:block}
.task-check svg{display:none;width:14px;height:14px;color:var(--white)}
.priority-bar{width:4px;height:32px;border-radius:2px;margin-right:12px;flex-shrink:0}
.priority-HIGH{background:var(--red)}.priority-MED{background:var(--orange)}.priority-LOW{background:var(--green)}
.task-info{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-desc{font-size:12px;color:var(--gray);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:12px}
.type-tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.type-MAHNUNG{background:#fef2f2;color:#dc2626}.type-ERINNERUNG{background:#fff7ed;color:#ea580c}
.type-SAMMELRECHNUNG{background:#eff6ff;color:#2563eb}.type-RECHNUNG{background:#e1effe;color:#1a56db}
.type-PRUEFUNG{background:#fefce8;color:#ca8a04}.type-ERFASSUNG{background:#f0fdf4;color:#16a34a}
.type-VERTRAG{background:#faf5ff;color:#7c3aed}.type-BERICHT{background:#f0f9ff;color:#0891b2}
.type-TODO{background:#dcfce7;color:#15803d}.type-NOTIZ{background:#fefce8;color:#a16207}.type-AUFGABE{background:#dbeafe;color:#1d4ed8}.type-MEETING{background:#fae8ff;color:#9333ea}.type-ANRUF{background:#ffedd5;color:#c2410c}.type-EMAIL{background:#e0f2fe;color:#0369a1}
.task-amount{font-size:13px;font-weight:600;color:#111}
.task-due{font-size:12px;color:var(--gray)}.task-due.overdue{color:var(--red);font-weight:600}
.task-actions{display:flex;gap:4px;margin-left:8px}
.icon-btn{width:30px;height:30px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--gray);transition:all .15s}
.icon-btn:hover{background:var(--gray-light);color:#111}
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding-bottom:20px;min-height:400px}
.kanban-col{min-width:270px;width:270px;background:var(--gray-light);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 300px)}
.kanban-col-header{padding:14px 16px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid}
.kanban-col-header .cnt{background:rgba(0,0,0,.08);border-radius:10px;padding:2px 8px;font-size:11px}
.kanban-cards{flex:1;padding:10px;overflow-y:auto;min-height:80px}
.kanban-card{background:var(--white);border:1px solid var(--gray-border);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:var(--blue)}
.kanban-card-pri{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:10px 0 0 10px}
.kanban-card-name{font-size:13px;font-weight:600;margin-bottom:4px;padding-left:8px}
.kanban-card-desc{font-size:11px;color:var(--gray);margin-bottom:8px;padding-left:8px;max-height:32px;overflow:hidden}
.kanban-card-foot{display:flex;align-items:center;justify-content:space-between;padding-left:8px}
.kanban-card-amt{font-size:12px;font-weight:600}
.flow-container{position:relative;width:100%;min-height:600px;background:var(--white);border:1px solid var(--gray-border);border-radius:12px;overflow:hidden}
.flow-canvas{width:100%;height:600px;position:relative}
.flow-node{position:absolute;padding:12px 18px;border:2px solid;border-radius:10px;cursor:move;user-select:none;min-width:120px;text-align:center;z-index:2;transition:box-shadow .15s}
.flow-node:hover{box-shadow:0 4px 12px rgba(0,0,0,.15)}
.flow-node-label{font-size:13px;font-weight:600}
.flow-node-notes{font-size:10px;color:var(--gray);margin-top:4px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.flow-node-type{font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.7}
.flow-node.mandant{background:#eaf3fb;border-color:#1d437e;color:#1d437e}
.flow-node.kunde{background:#f0fdf4;border-color:#16a34a;color:#166534}
.flow-node.mahnung{background:#fef2f2;border-color:#dc2626;color:#991b1b}
.flow-node.erinnerung{background:#fff7ed;border-color:#ea580c;color:#9a3412}
.flow-node.sammelrechnung{background:#faf5ff;border-color:#7c3aed;color:#5b21b6}
.flow-node.rechnung{background:#e1effe;border-color:#1a56db;color:#1e429f}
.flow-node.notiz{background:#fefce8;border-color:#ca8a04;color:#854d0e}
.flow-toolbar{display:flex;gap:8px;padding:12px;border-bottom:1px solid var(--gray-border);flex-wrap:wrap;align-items:center}
.flow-toolbar label{font-size:12px;color:var(--gray);font-weight:600}
.flow-add-btn{padding:5px 10px;font-size:11px;border:1px dashed var(--gray-border);background:var(--white);border-radius:6px;cursor:pointer;font-weight:500}
.flow-add-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
svg.flow-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.flow-line{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--white);border-radius:16px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.18)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border:none;background:var(--gray-light);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gray)}
.modal-close:hover{background:#ddd}
.modal-body{padding:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-border);border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,67,126,.1)}
.form-group textarea{min-height:70px;resize:vertical}
.form-row{display:flex;gap:12px}.form-row .form-group{flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-border);display:flex;gap:8px;justify-content:flex-end}
.detail-panel{position:fixed;top:0;right:0;width:440px;height:100vh;background:var(--white);box-shadow:-4px 0 20px rgba(0,0,0,.1);z-index:400;display:flex;flex-direction:column;overflow:hidden}
.detail-header{padding:20px 24px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between}
.detail-header h3{font-size:16px;font-weight:700;flex:1;margin-right:12px}
.detail-body{flex:1;overflow-y:auto;padding:24px}
.detail-field{margin-bottom:16px}
.detail-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-value{font-size:14px;color:#111}
.detail-actions{padding:16px 24px;border-top:1px solid var(--gray-border);display:flex;flex-wrap:wrap;gap:8px}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999}
.toast{padding:12px 20px;border-radius:10px;background:#111;color:var(--white);font-size:13px;margin-bottom:8px;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:380px}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.info{background:var(--blue-dark)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.inv-table{width:100%;border-collapse:collapse}
.inv-table th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-border);background:var(--gray-light)}
.inv-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--gray-border)}
.inv-table tr:hover{background:var(--blue-light);cursor:pointer}
.inv-status{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.inv-OPEN{background:#fff7ed;color:#ea580c}.inv-PAID{background:#f0fdf4;color:#16a34a}.inv-OVERDUE{background:#fef2f2;color:#dc2626}.inv-DRAFT{background:#f3f4f6;color:#6b7280}
.inv-link{color:var(--blue-dark);text-decoration:underline;cursor:pointer;font-size:12px}
.inv-link:hover{color:#152f5e}
.node-edit-popup{position:absolute;background:var(--white);border:1px solid var(--gray-border);border-radius:10px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:10;width:250px}
.node-edit-popup label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:4px;margin-top:8px}
.node-edit-popup input,.node-edit-popup select,.node-edit-popup textarea{width:100%;padding:6px 10px;border:1px solid var(--gray-border);border-radius:6px;font-size:12px;outline:none;font-family:inherit}
.node-edit-popup textarea{min-height:60px;resize:vertical}
.node-edit-popup .pa{display:flex;gap:6px;margin-top:12px;justify-content:flex-end}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:24px}
.dash-card{background:var(--white);border:1px solid var(--gray-border);border-radius:14px;padding:20px;transition:box-shadow .2s}.dash-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.dash-card h4{font-size:13px;color:var(--gray);margin-bottom:8px}
.dash-card .big{font-size:28px;font-weight:700}
.recent-list{background:var(--white);border:1px solid var(--gray-border);border-radius:12px;overflow:hidden}
.recent-list h3{padding:16px 20px;font-size:15px;font-weight:700;border-bottom:1px solid var(--gray-border)}
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--gray-border);font-size:13px}
.recent-item:last-child{border:none}
.recent-item:hover{background:var(--gray-light);cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.tab-bar{display:flex;border-bottom:2px solid var(--gray-border);margin-bottom:20px}
.tab-btn{padding:10px 20px;border:none;background:none;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--blue-dark);border-bottom-color:var(--blue-dark)}
.tab-btn:hover:not(.active){color:#111}
.settings-section{background:var(--white);border:1px solid var(--gray-border);border-radius:14px;padding:24px;margin-bottom:20px}
.settings-section h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--blue-dark)}
.service-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.service-row input{flex:1}
.service-row .amt{width:100px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#aaa}
/* === STICKY NOTES === */
.sticky-bar{display:flex;flex-wrap:wrap;gap:12px;padding:14px 16px;background:#fffde7;border-bottom:2px solid #f9c30b;align-items:flex-start}
.sticky-bar-header{width:100%;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sticky-bar-header span{font-size:12px;font-weight:700;color:#92650a;letter-spacing:.4px;text-transform:uppercase}
.sticky-note{position:relative;background:#fff9c4;border:1.5px solid #f9c30b;border-radius:8px;padding:8px 32px 8px 10px;min-width:180px;max-width:280px;box-shadow:2px 3px 8px rgba(0,0,0,.08)}
.sticky-note textarea{width:100%;min-height:64px;border:none;background:transparent;resize:none;font-size:13px;color:#3d2e00;line-height:1.5;outline:none;font-family:inherit}
.sticky-note textarea::placeholder{color:#c9a227;opacity:.8}
.sticky-note-del{position:absolute;top:5px;right:6px;background:none;border:none;cursor:pointer;font-size:14px;color:#c9a227;line-height:1;padding:2px 4px;border-radius:4px}
.sticky-note-del:hover{background:#fde68a;color:#92650a}
.sticky-add-btn{background:#fff9c4;border:1.5px dashed #f9c30b;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;color:#92650a;cursor:pointer;white-space:nowrap;align-self:center}

function setPageTitle(name,isXBrand){
  if(isXBrand){$('pageTitle').innerHTML=xlogo(name,'lg')}else{$('pageTitle').textContent=name}

// === PAGE ROUTER ===
function renderPage(){
  $('pageToolbar').innerHTML='';$('pageKpis').innerHTML='';

  else if(curPage==='leistungsnetz'){setPageTitle('WorkCoordination',true);renderLN()}
  else if(curPage==='invoices'){setPageTitle('Accounts',true);renderInvoices()}
  else if(curPage==='customers'){setPageTitle('Accounts',true);renderCustomers()}

// === DASHBOARD (Cross-Mandant) ===
function renderDashboard(){
  const mi=invoices;
  const allOpen=tasks.filter(t=>t.status!=='DONE');
  const overdue=allOpen.filter(t=>t.due&&new Date(t.due)<new Date()).length;
  const highPri=allOpen.filter(t=>t.pri==='HIGH').length;
  const invOpen=mi.filter(i=>i.status==='OPEN'||i.status==='OVERDUE');
  const invPaid=mi.filter(i=>i.status==='PAID').reduce((s,i)=>s+i.amt,0);
  const mName=m=>M.find(x=>x.id===m)?.name||'Persönlich';
  const mColor=m=>{const found=M.find(x=>x.id===m);return found?found.color:'#6b7280'};
  const priColor={HIGH:'#dc2626',MED:'#ea580c',LOW:'#16a34a'};
  const priLabel={HIGH:'🔴 HOCH',MED:'🟡 MITTEL',LOW:'🟢 NIEDRIG'};
  // Sort: HIGH first, then by due date, then creation order
  const sorted=[...allOpen].sort((a,b)=>{
    const po={HIGH:0,MED:1,LOW:2};
    if(po[a.pri]!==po[b.pri])return po[a.pri]-po[b.pri];
    if(a.due&&b.due)return new Date(a.due)-new Date(b.due);
    if(a.due)return -1; if(b.due)return 1;
    return 0;
  });
  $('pageKpis').innerHTML='<div class="kpi-strip">'+
    '<div class="kpi-card"><div class="kpi-label">Offen gesamt</div><div class="kpi-value blue">'+allOpen.length+'</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">🔴 Hohe Priorität</div><div class="kpi-value red">'+highPri+'</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">⚠️ Überfällig</div><div class="kpi-value orange">'+overdue+'</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">Rechnungen offen</div><div class="kpi-value blue">'+invOpen.length+'</div></div>'+
    '<div class="kpi-card"><div class="kpi-label">Bezahlt</div><div class="kpi-value green">'+fc(invPaid)+'</div></div>'+
  '</div>';
  $('pageToolbar').innerHTML='<div class="toolbar"><strong style="font-size:15px">📋 Wiedervorlage — Alle offenen Aufgaben</strong><span style="flex:1"></span>'+
    '<button class="btn btn-primary" onclick="goPage(\'leistungsnetz\')">WORKcoordination</button>'+
    '<button class="btn btn-secondary" style="margin-left:8px" onclick="goPage(\'taskmanager\')">Persönliche Aufgaben</button>'+
  '</div>';
  let rows='';
  if(sorted.length===0){
    rows='<tr><td colspan="6" style="text-align:center;color:var(--gray);padding:32px">Keine offenen Aufgaben — alles erledigt! ✅</td></tr>';
  } else {
    sorted.forEach(t=>{
      const isOverdue=t.due&&new Date(t.due)<new Date();
      const dueCss=isOverdue?'color:#dc2626;font-weight:700':'color:var(--gray)';
      const rowBg=isOverdue?'background:#fff5f5':'';
      rows+='<tr style="cursor:pointer;'+rowBg+'" onclick="'+( t.mid ? "goPage('leistungsnetz');setTimeout(()=>openDetail('"+t.id+"'),100)" : "goPage('taskmanager');setTimeout(()=>openDetail('"+t.id+"'),100)" )+'">'+
        '<td style="width:36px;text-align:center">'+
          '<button onclick="event.stopPropagation();togDone(\''+t.id+'\')" style="background:none;border:2px solid #d1d5db;border-radius:50%;width:24px;height:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px" title="Erledigen">✓</button>'+
        '</td>'+
        '<td><div style="font-weight:600;font-size:14px">'+t.name+'</div>'+
          (t.note?'<div style="font-size:11px;color:var(--gray);margin-top:2px">'+t.note+'</div>':'')+
        '</td>'+
        '<td><span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600"><span style="width:10px;height:10px;border-radius:50%;background:'+mColor(t.mid)+';display:inline-block"></span>'+mName(t.mid)+'</span></td>'+
        '<td><span class="type-tag type-'+t.type+'">'+t.type+'</span></td>'+
        '<td style="'+dueCss+';font-size:12px">'+(t.due?fd(t.due)+(isOverdue?' ⚠️':''):'—')+'</td>'+
        '<td style="font-size:11px;font-weight:700;color:'+priColor[t.pri||'LOW']+'">'+priLabel[t.pri||'LOW']+'</td>'+
      '</tr>';
    });
  }
  $('contentArea').innerHTML=
    '<div style="overflow-x:auto;margin-top:4px">'+
    '<table class="inv-table" style="width:100%">'+
      '<thead><tr>'+
        '<th style="width:36px"></th>'+
        '<th>Aufgabe</th>'+
        '<th>Mandant</th>'+
        '<th>Typ</th>'+
        '<th>Fällig</th>'+
        '<th>Priorität</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table></div>'+
    (invoices.length?
      '<div style="margin-top:20px"><h3 style="font-size:14px;font-weight:700;color:var(--blue-dark);margin-bottom:10px">📄 Offene Rechnungen</h3>'+
      '<table class="inv-table"><thead><tr><th>Nr.</th><th>Mandant</th><th>Betrag</th><th>Status</th><th>Datum</th></tr></thead><tbody>'+
      mi.filter(i=>i.status!=='PAID').map(i=>'<tr onclick="switchM(\''+i.mid+'\');goPage(\'invoices\')" style="cursor:pointer">'+
        '<td style="font-weight:600">'+i.num+'</td>'+
        '<td><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px"><span style="width:8px;height:8px;border-radius:50%;background:'+mColor(i.mid)+';display:inline-block"></span>'+mName(i.mid)+'</span></td>'+
        '<td style="font-weight:700">'+fc(i.amt)+'</td>'+
        '<td><span class="inv-status inv-'+i.status+'">'+(i.status==='OPEN'?'Offen':'Überfällig')+'</span></td>'+
        '<td style="font-size:12px;color:var(--gray)">'+fd(i.date)+'</td>'+
      '</tr>').join('')+
      '</tbody></table></div>'
    :'');
}

  mi.forEach(i=>{
    html+='<tr>'+
      '<td style="font-weight:600">'+i.num+'</td>'+
      '<td>'+cn(i.cid)+'</td>'+
      '<td>'+fd(i.date)+'</td>'+
      '<td style="font-weight:600">'+fc(i.amt)+'</td>'+
      '<td><span class="inv-status inv-'+i.status+'">'+(i.status==='PAID'?'Bezahlt':i.status==='OPEN'?'Offen':i.status==='OVERDUE'?'Überfällig':'Entwurf')+'</span></td>'+
      '<td style="white-space:nowrap">'+
        '<button class="btn btn-sm btn-secondary" onclick="generatePDF(\''+i.id+'\')" title="PDF erstellen" style="display:inline-flex">PDF</button> '+
        '<button class="btn btn-sm btn-turquoise" onclick="openEmailModal(\''+i.id+'\')" title="Per E-Mail senden" style="display:inline-flex">E-Mail</button> '+
        (i.status!=='PAID'?'<button class="btn btn-sm btn-green" onclick="markPaid(\''+i.id+'\')" style="display:inline-flex">Bezahlt</button> ':'')+
      '</td>'+

  });

function saveNewInvoice(){
  const cid=$('invCid').value;
  const amt=parseFloat($('invAmt').value)||0;
  if(!cid||!amt){toast('Bitte Kunde und Betrag angeben','error');return}
  invNo++;
  const num=cm.prefix+' '+new Date().getFullYear()+'/'+String(invNo).padStart(3,'0');
  const inv={id:'i'+Date.now(),num,cid,amt,status:'OPEN',date:$('invDate').value||new Date().toISOString().slice(0,10),mid:cm.id,taskId:null,positionen:$('invPositionen').value||''};
  invoices.push(inv);
  saveData();
  closeTF();
  toast('Rechnung '+num+' erstellt','success');
  renderInvoices();
}

function saveCustomer(cid){
  const name=$('cfName').value.trim();
  if(!name){toast('Bitte Name eingeben','error');return}
  const svcs=[];
  document.querySelectorAll('#svcList .service-row').forEach(r=>{
    const n=r.querySelector('.svc-name').value.trim();
    const p=parseFloat(r.querySelector('.svc-price').value)||0;
    const u=r.querySelector('.svc-unit').value;
    if(n)svcs.push({name:n,price:p,unit:u});
  });
  const addr={ansprechpartner:$('cfAnsprech').value,strasse:$('cfStrasse').value,plz:$('cfPlz').value,ort:$('cfOrt').value,land:$('cfLand').value,tel:$('cfTel').value,steuernr:$('cfSteuer').value};
  if(cid){
    const c=C.find(x=>x.id===cid);
    if(c){Object.assign(c,{name,...addr,email:$('cfEmail').value,cc:$('cfCC').value,emailSubject:$('cfSubject').value,emailBody:$('cfBody').value,services:svcs})}
  }else{
    C.push({id:'c'+Date.now(),name,mid:cm.id,...addr,email:$('cfEmail').value,cc:$('cfCC').value,services:svcs,emailSubject:$('cfSubject').value,emailBody:$('cfBody').value});
  }
  saveData();closeTF();toast('Kunde gespeichert','success');renderCustomers();
}

function renderBriefvorlage(){
  const bv=cm.briefvorlage||{};
  const fields=[
    {k:'firma',l:'Firma / Name',w:'full'},
    {k:'strasse',l:'Straße + Nr.',w:'full'},
    {k:'plz',l:'PLZ',w:'half'},{k:'ort',l:'Ort',w:'half'},
    {k:'land',l:'Land',w:'half'},{k:'tel',l:'Telefon',w:'half'},
    {k:'email',l:'E-Mail',w:'half'},{k:'web',l:'Webseite',w:'half'},
    {k:'steuernr',l:'Steuernummer',w:'half'},{k:'ustidnr',l:'USt-IdNr.',w:'half'},
    {k:'bank',l:'Bank',w:'full'},
    {k:'iban',l:'IBAN',w:'half'},{k:'bic',l:'BIC',w:'half'},
    {k:'zahlungsziel',l:'Zahlungsziel (Tage)',w:'half',type:'number'},
    {k:'kopfzeile',l:'Kopfzeile (Dokumenttitel)',w:'half'},
    {k:'fusszeile',l:'Fußzeile',w:'full',type:'textarea'}
  ];
  let h='<div class="settings-section"><h3>Briefvorlage — '+cm.name+'</h3>';
  let inRow=false;
  fields.forEach(f=>{
    if(f.w==='full'){
      if(inRow){h+='</div>';inRow=false}
      if(f.type==='textarea') h+='<div class="form-group"><label>'+f.l+'</label><textarea id="bv_'+f.k+'">'+(bv[f.k]||'')+'</textarea></div>';
      else h+='<div class="form-group"><label>'+f.l+'</label><input id="bv_'+f.k+'" value="'+(bv[f.k]||'')+'" '+(f.type==='number'?'type="number"':'')+'></div>';
    }else{
      if(!inRow){h+='<div class="form-row">';inRow=true}
      h+='<div class="form-group"><label>'+f.l+'</label><input id="bv_'+f.k+'" value="'+(bv[f.k]||'')+'" '+(f.type==='number'?'type="number"':'')+'></div>';
      if(inRow&&h.split('<div class="form-row">').pop().split('form-group').length>2){h+='</div>';inRow=false}

  h+='<div style="margin-top:16px;display:flex;gap:8px"><button class="btn btn-primary" onclick="saveBriefvorlage()">Briefvorlage speichern</button></div></div>';

function saveBriefvorlage(){
  const bv=cm.briefvorlage||{};
  ['firma','strasse','plz','ort','land','tel','email','web','steuernr','ustidnr','bank','iban','bic','zahlungsziel','kopfzeile','fusszeile'].forEach(k=>{
    const el=$('bv_'+k);if(el)bv[k]=k==='zahlungsziel'?parseInt(el.value)||14:el.value;
  });
  cm.briefvorlage=bv;
  saveData();toast('Briefvorlage gespeichert','success');
}

  try{const d=JSON.parse($('bvJson').value);cm.briefvorlage=d;saveData();toast('Briefvorlage importiert','success');renderSettings()}
  catch(e){toast('Ungültiges JSON: '+e.message,'error')}
}
function exportAll(){
  const d={mandanten:M.map(m=>({...m})),kunden:C.map(c=>({...c})),aufgaben:tasks,rechnungen:invoices,rechnungsNr:invNo};
  $('allJson').value=JSON.stringify(d,null,2);toast('Alle Daten exportiert','success');
}
function importAll(){
  try{
    const d=JSON.parse($('allJson').value);
    if(d.mandanten)d.mandanten.forEach(sm=>{const m=M.find(x=>x.id===sm.id);if(m)Object.assign(m,sm)});
    if(d.kunden){d.kunden.forEach(sc=>{const c=C.find(x=>x.id===sc.id);if(c)Object.assign(c,sc);else C.push(sc)})}
    if(d.aufgaben)tasks=d.aufgaben;
    if(d.rechnungen)invoices=d.rechnungen;
    if(d.rechnungsNr)invNo=d.rechnungsNr;
    saveData();toast('Alle Daten importiert','success');renderPage();
  }catch(e){toast('Ungültiges JSON: '+e.message,'error')}
}

  if(!delegated.length){h+='<p style="color:var(--gray);font-size:14px">Keine offenen Delegationen vorhanden.</p>';}

function renderStickyBar(){

  bar.style.display='flex';
  let h='<div class="sticky-bar-header"><span>📌 Schnellnotizen</span></div>';
  h+=stickyNotes.map(n=>
    '<div class="sticky-note">'+

    n.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')+
    '</textarea>'+
    '<button class="sticky-note-del" onclick="deleteStickyNote(\''+n.id+'\')" title="Notiz löschen">✕</button>'+
    '</div>'
  ).join('');
  h+='<button class="sticky-add-btn" onclick="addStickyNote()">+ Notiz</button>';
  bar.innerHTML=h;
}
function addStickyNote(){
  stickyNotes.push({id:'sn'+Date.now(),text:''});
  saveData();
  renderStickyBar();
  // focus the new textarea
  const bars=document.querySelectorAll('#stickyBar .sticky-note textarea');
  if(bars.length)bars[bars.length-1].focus();
}
function updateStickyNote(id,text){
  const n=stickyNotes.find(x=>x.id===id);
  if(n){n.text=text;saveData();}
}
function deleteStickyNote(id){
  stickyNotes=stickyNotes.filter(x=>x.id!==id);
  saveData();
  renderStickyBar();
}
function hideStickyBar(){
  const bar=$('stickyBar');
  if(bar)bar.style.display='none';
}

function getFilt(){
  const s=($('sInput')?.value||'').toLowerCase();
  const fm=$('fMandant')?.value||'';
  const ft=$('fType')?.value||'';
  const fs=$('fStatus')?.value||'';
  return tasks.filter(t=>{
    if(fm&&t.mid!==fm)return false;
    if(s&&!t.name.toLowerCase().includes(s)&&!(t.desc||'').toLowerCase().includes(s))return false;
    if(ft&&t.type!==ft)return false;
    if(fs&&t.status!==fs)return false;
    return true;
  });
}

function renderLNContent(){
  closeDetail();
  if(curView==='list') renderList();
  else if(curView==='kanban') renderKanban();
  else renderFlow();
}

function renderList(){
  const f=getFilt();
  const grp={OVERDUE:[],READY:[],OPEN:[],PENDING:[],DONE:[]};
  const gl={OVERDUE:'Überfällig',READY:'Bereit',OPEN:'Offen',PENDING:'Wartend',DONE:'Erledigt'};
  const gc={OVERDUE:'#dc2626',READY:'#16a34a',OPEN:'#2563eb',PENDING:'#ca8a04',DONE:'#6b7280'};
  const mColor=mid=>M.find(x=>x.id===mid)?.color||'#888';
  const mName=mid=>M.find(x=>x.id===mid)?.name||'';
  f.forEach(t=>{if(grp[t.status])grp[t.status].push(t)});
  let h='';
  for(const[s,items]of Object.entries(grp)){
    if(!items.length)continue;
    h+='<div class="status-group"><div class="status-header"><span class="status-dot" style="background:'+gc[s]+'"></span>'+gl[s]+'<span class="status-count">'+items.length+'</span></div>';
    items.forEach(t=>{
      const ov=t.due&&new Date(t.due)<new Date()&&t.status!=='DONE';
      const inv=invoices.find(i=>i.id===t.invoiceId);
      h+='<div class="task-row" onclick="openDetail(\''+t.id+'\')">'+
        '<div class="task-check '+(t.status==='DONE'?'done':'')+'" onclick="event.stopPropagation();togDone(\''+t.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg></div>'+
        '<span class="mandant-dot" style="background:'+(t.mid?mColor(t.mid):'#9ca3af')+';display:inline-block;flex-shrink:0;margin-right:8px" title="'+(t.mid?mName(t.mid):'Persönlich')+'"></span>'+
        '<div class="priority-bar priority-'+t.pri+'"></div>'+

function saveTask(){
  const name=$('tfName').value.trim();
  if(!name){toast('Bitte Name eingeben','error');return}
  const delegateOn=$('tfDelegateToggle')&&$('tfDelegateToggle').checked;
  const assignedTo=delegateOn?($('tfAssignedTo').value.trim()):'';
  const assignedEmail=delegateOn?($('tfAssignedEmail').value.trim()):'';
  const assignedWA=delegateOn?($('tfAssignedWA').value.trim()):'';
  const assignedTG=delegateOn?($('tfAssignedTG').value.trim()):'';
  const reminderInterval=delegateOn?($('tfReminderInterval').value):'';
  const d={name,desc:$('tfDesc').value,type:$('tfType').value,status:$('tfStatus').value,pri:$('tfPri').value,due:$('tfDue').value||null,amt:parseFloat($('tfAmt').value)||0,cid:$('tfCid').value,note:$('tfNote').value,mid:$('tfMid').value,
    assignedTo,assignedEmail,assignedWA,assignedTG,reminderInterval};
  if(editTid){
    const i=tasks.findIndex(t=>t.id===editTid);
    if(i>=0){
      const existing=tasks[i];
      // Generate token only if newly delegated (had no token before)
      if(delegateOn&&assignedTo&&!existing.token)d.token=genToken();
      else if(delegateOn&&existing.token)d.token=existing.token;
      else d.token='';
      // Keep delegation meta if still delegated
      if(delegateOn&&existing.delegated){d.delegated=true;d.delegatedAt=existing.delegatedAt;d.lastReminder=existing.lastReminder;d.nextReminder=existing.nextReminder;d.reminderCount=existing.reminderCount||0;d.confirmedAt=existing.confirmedAt}
      else{d.delegated=false;d.delegatedAt=null;d.lastReminder=null;d.nextReminder=null;d.reminderCount=0;d.confirmedAt=null}
      tasks[i]={...tasks[i],...d};
    }
    toast('Aufgabe aktualisiert','success');
  } else {
    const token=delegateOn&&assignedTo?genToken():'';
    tasks.push({id:id(),...d,token,delegated:false,delegatedAt:null,lastReminder:null,nextReminder:null,reminderCount:0,confirmedAt:null});
    toast('Aufgabe erstellt','success');
  }
  saveData();closeTF();
  if(curPage==='taskmanager')renderTaskManager();
  else if(curPage==='mandanttasks')renderMandantTasks();
  else renderLN();
}

// === DELEGATION & NOTIFICATION FUNCTIONS ===
function genToken(){return 'xmc_'+Math.random().toString(36).substr(2,9)+'_'+Date.now().toString(36)}
function getConfirmUrl(token){return location.origin+location.pathname+'#confirm='+token}
function toggleDelegateFields(){
  const cb=$('tfDelegateToggle');
  const fields=$('tfDelegateFields');
  if(cb&&fields)fields.className='delegate-fields'+(cb.checked?' open':'');
}
function checkTokenConfirmation(){
  const hash=location.hash;
  if(!hash||!hash.startsWith('#confirm='))return;
  const token=hash.slice(9);
  const t=tasks.find(x=>x.token===token);
  if(t){
    if(t.status==='DONE'){toast('Diese Aufgabe wurde bereits bestätigt.','info');history.replaceState(null,'',location.pathname);return}
    t.status='DONE';t.confirmedAt=new Date().toISOString();
    saveData();
    toast('✅ Aufgabe "'+t.name+'" wurde als erledigt bestätigt!','success');
    history.replaceState(null,'',location.pathname);
  } else if(token){
    toast('Bestätigungslink ungültig oder abgelaufen.','error');
    history.replaceState(null,'',location.pathname);
  }
}
function calcNextReminder(interval){
  const now=new Date();
  if(interval==='6h')return new Date(now.getTime()+6*3600*1000).toISOString();
  if(interval==='1d')return new Date(now.getTime()+24*3600*1000).toISOString();
  if(interval==='3d')return new Date(now.getTime()+3*24*3600*1000).toISOString();
  if(interval==='1w')return new Date(now.getTime()+7*24*3600*1000).toISOString();
  return null;
}
function checkReminders(){
  const now=new Date();
  let changed=false;
  tasks.forEach(t=>{
    if(!t.delegated||t.status==='DONE'||!t.nextReminder)return;
    if(new Date(t.nextReminder)<=now){
      changed=true;
      t.reminderCount=(t.reminderCount||0)+1;
      t.lastReminder=new Date().toISOString();
      t.nextReminder=t.reminderInterval?calcNextReminder(t.reminderInterval):null;
      // Browser notification
      if(window.Notification&&Notification.permission==='granted'){
        new Notification('xMasterCenter – Erinnerung',{body:'Aufgabe "'+t.name+'" wartet auf Bestätigung von '+t.assignedTo+'.',icon:location.pathname});
      }
      toast('🔔 Erinnerung: "'+t.name+'" ('+t.assignedTo+')','info');
    }
  });
  if(changed)saveData();
}
function requestNotifPermission(){
  if(!window.Notification){toast('Browser unterstützt keine Benachrichtigungen.','error');return}
  Notification.requestPermission().then(p=>{
    if(p==='granted')toast('✅ Benachrichtigungen aktiviert!','success');
    else if(p==='denied')toast('Benachrichtigungen wurden abgelehnt. Bitte Browser-Einstellungen prüfen.','error');
    else toast('Benachrichtigungen stehen noch aus.','info');
    renderSettings();
  });
}
function sendTaskEmail(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const url=getConfirmUrl(t.token);
  const subject=encodeURIComponent('[xMasterCenter] Aufgabe: '+t.name);
  const body=encodeURIComponent(
    'Hallo '+t.assignedTo+',\n\n'+
    'du hast eine Aufgabe zugewiesen bekommen:\n\n'+
    '📋 Aufgabe: '+t.name+'\n'+
    (t.desc?'📝 Beschreibung: '+t.desc+'\n':'')+
    (t.due?'📅 Fällig am: '+t.due+'\n':'')+
    '\nWenn du fertig bist, bitte hier bestätigen:\n'+url+

  );

  window.open(mailto,'_blank');

}
function sendTaskWhatsApp(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const url=getConfirmUrl(t.token);
  const text=encodeURIComponent(
    '📋 *Aufgabe: '+t.name+'*\n'+
    (t.desc?'📝 '+t.desc+'\n':'')+
    (t.due?'📅 Fällig: '+t.due+'\n':'')+
    '\n✅ Wenn erledigt, bitte bestätigen:\n'+url
  );
  const phone=t.assignedWA.replace(/[^0-9]/g,'');
  window.open('https://wa.me/'+phone+'?text='+text,'_blank');
  markDelegated(tid);
}
function sendTaskTelegram(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const url=getConfirmUrl(t.token);
  const text=encodeURIComponent(
    '📋 Aufgabe: '+t.name+'\n'+
    (t.desc?t.desc+'\n':'')+
    (t.due?'Fällig: '+t.due+'\n':'')+
    '\n✅ Bestätigung: '+url
  );
  const username=t.assignedTG.replace(/^@/,'');
  window.open('https://t.me/'+username+'?text='+text,'_blank');
  markDelegated(tid);
}
function markDelegated(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.delegated=true;
  t.delegatedAt=new Date().toISOString();
  if(t.reminderInterval){t.nextReminder=calcNextReminder(t.reminderInterval)}
  saveData();
  toast('✅ Gesendet! Delegation aktiv.','success');
  if(curPage==='taskmanager')renderTaskManager();
  else if(curPage==='mandanttasks')renderMandantTasks();
  else renderLN();
  openDetail(tid);
}
function sendReminder(tid){
  const t=tasks.find(x=>x.id===tid);if(!t||!t.delegated)return;
  if(t.assignedWA){sendTaskWhatsApp(tid)}
  else if(t.assignedEmail){sendTaskEmail(tid)}
  else if(t.assignedTG){sendTaskTelegram(tid)}
  else toast('Keine Kontaktdaten vorhanden.','error');
}

// === DETAIL PANEL ===
function openDetail(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const c=cn(t.cid);
  const inv=invoices.find(i=>i.id===t.invoiceId);
  const p=$('detailPanel');p.style.display='flex';
  p.innerHTML=
    '<div class="detail-header"><h3>'+t.name+'</h3><button class="modal-close" onclick="closeDetail()">&times;</button></div>'+
    '<div class="detail-body">'+
      '<div class="detail-field"><div class="detail-label">Mandant</div><div class="detail-value"><span class="mandant-dot" style="background:'+(t.mid?(M.find(x=>x.id===t.mid)?.color||'#888'):'#9ca3af')+';display:inline-block;vertical-align:middle;margin-right:6px"></span>'+(t.mid?(M.find(x=>x.id===t.mid)?.name||'—'):'👤 Persönlich / Kein Mandant')+'</div></div>'+
      '<div class="detail-field"><div class="detail-label">Typ / Status</div><div class="detail-value"><span class="type-tag type-'+t.type+'" style="margin-right:8px">'+t.type+'</span>'+t.status+'</div></div>'+
      '<div class="detail-field"><div class="detail-label">Priorität</div><div class="detail-value">'+(t.pri==='HIGH'?'🔴 Hoch':t.pri==='MED'?'🟡 Mittel':'🟢 Niedrig')+'</div></div>'+
      '<div class="detail-field"><div class="detail-label">Beschreibung</div><div class="detail-value">'+(t.desc||'—')+'</div></div>'+
      (c?'<div class="detail-field"><div class="detail-label">Kunde</div><div class="detail-value">'+c+'</div></div>':'')+
      (t.amt?'<div class="detail-field"><div class="detail-label">Betrag</div><div class="detail-value" style="font-size:20px;font-weight:700">'+fc(t.amt)+'</div></div>':'')+
      '<div class="detail-field"><div class="detail-label">Fällig am</div><div class="detail-value">'+fd(t.due)+'</div></div>'+
      (t.note?'<div class="detail-field"><div class="detail-label">Empfehlung</div><div class="detail-value" style="background:#fffbeb;padding:10px;border-radius:8px;border-left:3px solid #ca8a04">'+t.note+'</div></div>':'')+
      (inv?'<div class="detail-field"><div class="detail-label">Verknüpfte Rechnung</div><div class="detail-value"><span class="inv-link" onclick="goPage(\'invoices\')">RE '+inv.num+' — '+fc(inv.amt)+' ('+inv.status+')</span></div></div>':'')+
      // DELEGATION SECTION
      (t.assignedTo?
        '<div class="detail-field" style="background:var(--blue-light);border-radius:10px;padding:12px">'+
          '<div class="detail-label">'+svgIcon('delegate',14)+' Delegation</div>'+
          '<div style="margin-top:6px">'+
            '<div style="font-size:13px;font-weight:600;color:#111">👤 '+t.assignedTo+'</div>'+
            (t.assignedEmail?'<div style="font-size:12px;color:var(--gray);margin-top:2px">📧 '+t.assignedEmail+'</div>':'')+
            (t.assignedWA?'<div style="font-size:12px;color:var(--gray);margin-top:2px">💬 WhatsApp: '+t.assignedWA+'</div>':'')+
            (t.assignedTG?'<div style="font-size:12px;color:var(--gray);margin-top:2px">✈️ Telegram: '+t.assignedTG+'</div>':'')+
            (t.reminderInterval?(function(){const rm={'6h':'Alle 6 Std.','1d':'Täglich','3d':'Alle 3 Tage','1w':'Wöchentlich'};return '<div style="font-size:12px;color:var(--gray);margin-top:2px">🔔 Erinnerung: '+(rm[t.reminderInterval]||t.reminderInterval)+'</div>'})():'')+
            (t.delegated?
              '<div class="remind-status">'+(t.confirmedAt?'<span class="delegate-badge confirmed">✅ Bestätigt</span>':'<span class="delegate-badge sent">📤 Gesendet</span>')+
              (t.delegatedAt?' <span style="color:#9ca3af">am '+new Date(t.delegatedAt).toLocaleDateString("de-DE")+'</span>':'')+
              (t.reminderCount>0?' · <span style="color:#6b7280">'+t.reminderCount+'× erinnert</span>':'')+
              (t.nextReminder&&!t.confirmedAt?' · Nächste Erinnerung: '+new Date(t.nextReminder).toLocaleString("de-DE",{dateStyle:"short",timeStyle:"short"}):'')+'</div>'
            :'')+
          '</div>'+
        '</div>'
      :'')+
    '</div>'+
    '<div class="detail-actions">'+
      (['RECHNUNG','SAMMELRECHNUNG','ERFASSUNG'].includes(t.type)&&t.status!=='DONE'&&!inv?'<button class="btn btn-primary" onclick="createInv(\''+t.id+'\')">Rechnung erstellen</button>':'')+
      (t.type==='MAHNUNG'&&t.status!=='DONE'?'<button class="btn btn-danger" onclick="sendMahn(\''+t.id+'\')">Mahnung senden</button>':'')+
      '<button class="btn btn-secondary" onclick="openTaskForm(\''+t.id+'\')">Bearbeiten</button>'+
      (t.status!=='DONE'?'<button class="btn btn-green" onclick="togDone(\''+t.id+'\')">Erledigt</button>':'')+
      // DELEGATION SEND BUTTONS
      (t.assignedTo&&t.status!=='DONE'?
        (t.assignedEmail?'<button class="btn btn-secondary btn-sm" onclick="sendTaskEmail(\''+t.id+'\')" title="Per E-Mail senden">📧 E-Mail</button>':'')+
        (t.assignedWA?'<button class="btn wa-btn btn-sm" onclick="sendTaskWhatsApp(\''+t.id+'\')" title="Per WhatsApp senden">💬 WhatsApp</button>':'')+
        (t.assignedTG?'<button class="btn tg-btn btn-sm" onclick="sendTaskTelegram(\''+t.id+'\')" title="Per Telegram senden">✈️ Telegram</button>':'')+
        (t.delegated&&!t.confirmedAt?'<button class="btn btn-orange btn-sm" onclick="sendReminder(\''+t.id+'\')" title="Jetzt erinnern">🔔 Erinnern</button>':'')
      :'')+
      '<button class="btn btn-danger btn-sm" onclick="delTask(\''+t.id+'\')">Löschen</button>'+
      (inv?'<button class="btn btn-secondary btn-sm" onclick="goPage(\'invoices\')">→ Rechnung</button>':'')+
    '</div>';
}
function closeDetail(){$('detailPanel').style.display='none'}

// === INVOICE FROM TASK ===
function createInv(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const tm=M.find(x=>x.id===t.mid)||cm;
  invNo++;
  const num=tm.prefix+' '+new Date().getFullYear()+'/'+String(invNo).padStart(3,'0');
  const inv={id:'i'+Date.now(),num,cid:t.cid,amt:t.amt||0,status:'OPEN',date:new Date().toISOString().slice(0,10),mid:tm.id,taskId:t.id};
  invoices.push(inv);
  t.status='DONE';t.completedAt=new Date().toISOString();t.invoiceId=inv.id;
  saveData();toast('Rechnung '+num+' erstellt ('+fc(inv.amt)+')','success');
  renderLN();openDetail(tid);
}

function sendMahn(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.status='DONE';t.completedAt=new Date().toISOString();
  saveData();toast('Mahnung an '+cn(t.cid)+' versendet','success');
  renderLN();
}

// === PDF GENERATION ===
function generatePDF(iid){
  const inv=invoices.find(x=>x.id===iid);if(!inv)return;
  const m=M.find(x=>x.id===inv.mid);if(!m)return;
  const bv=m.briefvorlage||{};
  const cust=C.find(x=>x.id===inv.cid);

  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    const w=doc.internal.pageSize.getWidth();

    // Header
    doc.setFontSize(10);doc.setTextColor(100);
    doc.text(bv.firma||m.name,14,20);
    if(bv.strasse)doc.text(bv.strasse,14,25);
    doc.text((bv.plz||'')+' '+(bv.ort||''),14,30);
    doc.text(bv.land||'',14,35);
    if(bv.tel)doc.text('Tel: '+bv.tel,14,40);
    if(bv.email)doc.text('E-Mail: '+bv.email,14,45);
    if(bv.web)doc.text('Web: '+bv.web,14,50);

    // Recipient
    doc.setFontSize(11);doc.setTextColor(0);
    doc.text(cust?cust.name:'',14,70);

    // Title
    doc.setFontSize(18);doc.setTextColor(29,67,126);
    doc.text(bv.kopfzeile||'Rechnung',14,90);

    // Invoice details
    doc.setFontSize(10);doc.setTextColor(0);
    doc.text('Rechnungsnr.: '+inv.num,14,100);
    doc.text('Datum: '+fd(inv.date),14,106);
    doc.text('Zahlungsziel: '+(bv.zahlungsziel||14)+' Tage',14,112);

    // Line
    doc.setDrawColor(200);doc.line(14,118,w-14,118);

    // Positions
    let y=128;
    doc.setFontSize(10);doc.setFont(undefined,'bold');
    doc.text('Pos.',14,y);doc.text('Beschreibung',30,y);doc.text('Betrag',w-40,y,{align:'right'});
    doc.setFont(undefined,'normal');
    y+=8;
    if(inv.positionen){
      doc.text('1',14,y);doc.text(inv.positionen,30,y);doc.text(fc(inv.amt),w-40,y,{align:'right'});
      y+=8;
    }else{
      doc.text('1',14,y);doc.text('Leistungen gemäß Vereinbarung',30,y);doc.text(fc(inv.amt),w-40,y,{align:'right'});
      y+=8;
    }

    // Total
    doc.setDrawColor(200);doc.line(14,y+2,w-14,y+2);
    y+=12;
    doc.setFont(undefined,'bold');doc.setFontSize(12);
    doc.text('Gesamt:',30,y);doc.text(fc(inv.amt),w-40,y,{align:'right'});

    // Bank details
    y+=20;
    doc.setFontSize(9);doc.setFont(undefined,'normal');doc.setTextColor(100);
    if(bv.bank)doc.text('Bank: '+bv.bank,14,y);
    if(bv.iban){y+=5;doc.text('IBAN: '+bv.iban,14,y)}
    if(bv.bic){y+=5;doc.text('BIC: '+bv.bic,14,y)}
    if(bv.steuernr){y+=5;doc.text('Steuernr.: '+bv.steuernr,14,y)}
    if(bv.ustidnr){y+=5;doc.text('USt-IdNr.: '+bv.ustidnr,14,y)}

    // Footer
    if(bv.fusszeile){
      doc.setFontSize(9);doc.setTextColor(120);
      doc.text(bv.fusszeile,w/2,280,{align:'center'});
    }

    doc.save('Rechnung_'+inv.num.replace(/\s+/g,'_')+'.pdf');
    toast('PDF erstellt: Rechnung_'+inv.num,'success');
  }catch(e){
    toast('PDF-Fehler: '+e.message,'error');
    console.error(e);
  }
}

// === EMAIL ===
function openEmailModal(iid){
  const inv=invoices.find(x=>x.id===iid);if(!inv)return;
  const m=M.find(x=>x.id===inv.mid);if(!m)return;
  const bv=m.briefvorlage||{};
  const cust=C.find(x=>x.id===inv.cid);if(!cust)return;

  // Replace placeholders
  const replacePH=(str)=>(str||'')
    .replace(/\{nr\}/g,inv.num)
    .replace(/\{betrag\}/g,fc(inv.amt))
    .replace(/\{mandant\}/g,m.name)
    .replace(/\{firma\}/g,bv.firma||m.name)
    .replace(/\{kunde\}/g,cust.name)
    .replace(/\{zahlungsziel\}/g,String(bv.zahlungsziel||14))
    .replace(/\{datum\}/g,fd(inv.date));

  const subject=replacePH(cust.emailSubject||'Rechnung {nr}');
  const body=replacePH(cust.emailBody||'');

  $('taskModal').style.display='flex';
  $('taskModal').innerHTML='<div class="modal">'+
    '<div class="modal-header"><h3>E-Mail senden — RE '+inv.num+'</h3><button class="modal-close" onclick="closeTF()">&times;</button></div>'+
    '<div class="modal-body">'+
      '<div class="form-row">'+
        '<div class="form-group"><label>An</label><input id="emTo" value="'+(cust.email||'')+'"></div>'+
        '<div class="form-group"><label>CC</label><input id="emCC" value="'+(cust.cc||'')+'"></div>'+
      '</div>'+
      '<div class="form-group"><label>Betreff</label><input id="emSubject" value="'+subject.replace(/"/g,'&quot;')+'"></div>'+
      '<div class="form-group"><label>Nachricht</label><textarea id="emBody" style="min-height:180px">'+body+'</textarea></div>'+
      '<div style="padding:12px;background:var(--gray-light);border-radius:8px;font-size:12px;color:var(--gray)">'+
        '<strong>Anhang:</strong> Rechnung_'+inv.num.replace(/\s+/g,'_')+'.pdf (wird automatisch generiert)'+
      '</div>'+
    '</div>'+
    '<div class="modal-footer">'+
      '<button class="btn btn-secondary" onclick="closeTF()">Abbrechen</button>'+
      '<button class="btn btn-primary" onclick="generatePDF(\''+inv.id+'\');closeTF()">Nur PDF erstellen</button>'+
      '<button class="btn btn-turquoise" onclick="sendEmail(\''+inv.id+'\')">E-Mail öffnen</button>'+
    '</div>'+
  '</div>';
}

function sendEmail(iid){
  const to=$('emTo').value;
  const cc=$('emCC').value;
  const subject=encodeURIComponent($('emSubject').value);
  const body=encodeURIComponent($('emBody').value);
  if(!to){toast('Bitte E-Mail-Adresse eingeben','error');return}

  // Generate PDF first
  generatePDF(iid);

  // Open mailto
  let mailto='mailto:'+to+'?subject='+subject+'&body='+body;
  if(cc)mailto+='&cc='+cc;
  window.open(mailto);

  // Save email to customer
  const inv=invoices.find(x=>x.id===iid);
  if(inv){const cust=C.find(x=>x.id===inv.cid);if(cust){cust.email=$('emTo').value;cust.cc=$('emCC').value;saveData()}}

  closeTF();
  toast('E-Mail-Client geöffnet + PDF erstellt','success');
}

// === PIN LOGIN ===
function pinNext(n){
  const v=document.getElementById('pin'+n).value;
  if(v&&n<4)document.getElementById('pin'+(n+1)).focus();
  if(n===4&&v)verifyPin();
}
function pinKey(e,n){
  if(e.key==='Backspace'&&!document.getElementById('pin'+n).value&&n>1){
    document.getElementById('pin'+(n-1)).focus();
  }
  if(e.key==='Enter')verifyPin();
}
function verifyPin(){
  const pin=[1,2,3,4].map(i=>document.getElementById('pin'+i).value).join('');
  if(pin.length<4){document.getElementById('pinError').textContent='Bitte 4-stelligen PIN eingeben';return}
  if(pin===APP_PIN){
    document.getElementById('pinScreen').style.display='none';
    initApp();
  }else{
    document.getElementById('pinError').textContent='Falscher PIN — bitte nochmal versuchen';
    [1,2,3,4].forEach(i=>{document.getElementById('pin'+i).value='';document.getElementById('pin'+i).style.borderColor='#dc2626'});
    document.getElementById('pin1').focus();
    setTimeout(()=>[1,2,3,4].forEach(i=>document.getElementById('pin'+i).style.borderColor='#E8E8ED'),1500);
  }
}

// === INIT ===
function initApp(){
  const hadSaved=loadData();
  if(!hadSaved){toast('Willkommen bei xMasterCenter — Keine gespeicherten Daten.','info')}
  checkTokenConfirmation();
  renderM();renderNav();renderPage();updateSyncBadge();
  setInterval(checkReminders,60000);
}

// Starte mit PIN-Screen (App wird erst nach PIN geladen)
document.getElementById('pin1').focus();
</script>
